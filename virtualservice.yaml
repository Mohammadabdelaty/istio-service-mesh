---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: httpbin
spec:
  hosts:
  - "httpbin.example.com"
  gateways:
  - httpbin-gateway
  http:
  - match:
    - uri:
        prefix: /status
    - uri:
        prefix: /delay
    route:
    route:
    - destination:
        host: myapp
        port:
          number: 8080
        subset: v1
      weight: 80
    - destination:
        host: myapp
        port:
          number: 8080
        subset: v2
      weight: 20